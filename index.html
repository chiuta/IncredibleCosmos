// ═══ PHYSICS ═══
function stepPhys(objs) {
  var evts = [];
  for (var i = 0; i < objs.length; i++) {
    var a = objs[i]; if (!a.alive || a.static || a.type === "target") continue;
    var ax = 0, ay = 0;
    for (var j = 0; j < objs.length; j++) {
      if (i === j || !objs[j].alive || !objs[j].hasGrav) continue;
      var b = objs[j], dx = b.x - a.x, dy = b.y - a.y, d = Math.max(6, Math.hypot(dx, dy));
      if (b.hasSpin && d < 85) { ax += (-dy / d) * 0.12; ay += (dx / d) * 0.12; }
      var f = 0.5 * a.mass * b.mass / (d * d);
      ax += f * dx / (d * a.mass); ay += f * dy / (d * a.mass);
    }
    a.vx += ax; a.vy += ay;
  }
  for (var ii = 0; ii < objs.length; ii++) {
    var o = objs[ii]; if (!o.alive || o.static || o.type === "target") continue;
    o.x += o.vx; o.y += o.vy;
    o.trail.push({ x: o.x, y: o.y }); if (o.trail.length > 100) o.trail.shift();
    for (var jj = 0; jj < objs.length; jj++) {
      if (ii === jj || !objs[jj].alive) continue;
      var ot = objs[jj], dd = dst(o, ot);
      if (ot.type === "target" && dd < ot.r + o.r) evts.push("win");
      if (ot.canAbsorb && dd < ot.r + 3) { o.alive = false; evts.push("dead"); }
      if (ot.wormId && dd < ot.r && !o.wcd) { var ex = objs.find(function(x) { return x.wormId && x.wormId !== ot.wormId && x.alive; }); if (ex) { o.x = ex.x + o.vx * 6; o.y = ex.y + o.vy * 6; o.wcd = 20; } }
      if (ot.isBoost && dd < ot.r + 6) { var sp = Math.hypot(o.vx, o.vy) || 1; o.vx = (o.vx / sp) * (sp + 1.5); o.vy = (o.vy / sp) * (sp + 1.5); }
      if (ot.isBomb && dd < ot.r + o.r) { var pa = Math.atan2(o.y - ot.y, o.x - ot.x); o.vx += Math.cos(pa) * 4.5; o.vy += Math.sin(pa) * 4.5; ot.alive = false; evts.push("boom"); }
      if (ot.isShield && dd < ot.r + o.r + 3) { var nx = (o.x - ot.x) / dd, ny = (o.y - ot.y) / dd; var dot = o.vx * nx + o.vy * ny; o.vx -= 2 * dot * nx; o.vy -= 2 * dot * ny; o.x = ot.x + nx * (ot.r + o.r + 5); o.y = ot.y + ny * (ot.r + o.r + 5); }
    }
    if (o.wcd > 0) o.wcd--;
    if (Math.abs(o.x) > 500 || Math.abs(o.y) > 500) { o.alive = false; evts.push("dead"); }
  }
  return evts;
}

// ═══ DRAW OBJECTS — VISUALLY CORRECT ═══
function drawObj(ctx, o, ox, oy, z, t, buildMode) {
  var x = ox + o.x * z, y = oy + o.y * z, rv = Math.max(3, o.r * z);

  // ── COMET: Bright head + flame tail ──
  if (o.type === "comet") {
    // Tail (drawn from trail, getting thinner and fainter)
    if (o.trail.length > 2) {
      for (var ti = 1; ti < o.trail.length; ti++) {
        var ta = ti / o.trail.length;
        var tw = rv * 1.2 * (1 - ta);
        ctx.strokeStyle = hs(30 + ta * 20, 90, 55 + ta * 25, (1 - ta) * 0.6);
        ctx.lineWidth = Math.max(0.5, tw);
        ctx.beginPath();
        ctx.moveTo(ox + o.trail[ti - 1].x * z, oy + o.trail[ti - 1].y * z);
        ctx.lineTo(ox + o.trail[ti].x * z, oy + o.trail[ti].y * z);
        ctx.stroke();
      }
    }
    // Coma glow
    var cg = ctx.createRadialGradient(x, y, rv * 0.2, x, y, rv * 3);
    cg.addColorStop(0, hs(40, 100, 85, 0.6));
    cg.addColorStop(0.4, hs(30, 90, 60, 0.2));
    cg.addColorStop(1, "transparent");
    ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(x, y, rv * 3, 0, TAU); ctx.fill();
    // Bright nucleus
    var cn = ctx.createRadialGradient(x, y, 0, x, y, rv);
    cn.addColorStop(0, "#fff");
    cn.addColorStop(0.5, hs(35, 100, 75));
    cn.addColorStop(1, hs(25, 90, 50, 0.8));

    if (buildMode && o.vx !== undefined) {
      var vl = Math.hypot(o.vx, o.vy) * 30 * z;
      var va = Math.atan2(o.vy, o.vx);
      ctx.strokeStyle = hs(40, 90, 70, 0.6); ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + Math.cos(va) * vl, y + Math.sin(va) * vl); ctx.stroke();
      ctx.fillStyle = hs(40, 90, 70, 0.6); ctx.beginPath();
      ctx.moveTo(x + Math.cos(va) * vl, y + Math.sin(va) * vl);
      ctx.lineTo(x + Math.cos(va - 0.35) * (vl - 8), y + Math.sin(va - 0.35) * (vl - 8));
      ctx.lineTo(x + Math.cos(va + 0.35) * (vl - 8), y + Math.sin(va + 0.35) * (vl - 8));
      ctx.fill();
    }
    return;
  }

  // ── TARGET: Green bullseye with pulsing rings ──
  if (o.type === "target") {
    var tp = 0.5 + 0.4 * Math.sin(t * 3);

    ctx.strokeStyle = hs(120, 80, 55, tp * 0.6); ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, rv + 8, 0, TAU); ctx.stroke();
    // Middle ring
    ctx.strokeStyle = hs(120, 70, 60, tp * 0.8); ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(x, y, rv, 0, TAU); ctx.stroke();
    // Inner fill
    ctx.fillStyle = hs(120, 60, 50, 0.12 + tp * 0.08);
    ctx.beginPath(); ctx.arc(x, y, rv + 8, 0, TAU); ctx.fill();
    // Center dot
    ctx.fillStyle = hs(120, 80, 65, tp);
    ctx.beginPath(); ctx.arc(x, y, 3, 0, TAU); ctx.fill();
    // Label
    ctx.fillStyle = hs(120, 60, 65, 0.7);
    ctx.font = Math.max(9, 10 * z) + "px system-ui"; ctx.textAlign = "center";
    ctx.fillText("ȚINTĂ", x, y + rv + 16);
    return;
  }

  // Gravity radius indicator in build mode
  if (buildMode && o.gravR && o.placed) {
    ctx.save();
    ctx.strokeStyle = hs(o.hue, 30, 50, 0.06 + 0.03 * Math.sin(t * 2));
    ctx.lineWidth = 1; ctx.setLineDash([3, 6]);
    ctx.beginPath(); ctx.arc(x, y, o.gravR * z, 0, TAU); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  }

  // ── STAR: Realistic with solar flares ──
  if (o.type === "star" || (o.hasGrav && o.mass >= 300 && !o.canAbsorb)) {
    var pulse = 0.85 + 0.15 * Math.sin(t * 2.5);
    // Wide corona glow (multi-layer)
    var sg = ctx.createRadialGradient(x, y, rv * 0.3, x, y, rv * 5);
    sg.addColorStop(0, hs(o.hue, 100, 90, 0.6 * pulse));
    sg.addColorStop(0.15, hs(o.hue, 95, 70, 0.35));
    sg.addColorStop(0.4, hs(o.hue - 5, 85, 50, 0.15));
    sg.addColorStop(1, "transparent");
    ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(x, y, rv * 5, 0, TAU); ctx.fill();
    // Solar flares (12 dynamic rays)
    ctx.save();
    for (var ri = 0; ri < 12; ri++) {
      var ra = ri * TAU / 12 + t * 0.2;
      var rl = rv * (2 + 0.8 * Math.sin(t * 3 + ri * 1.3));
      var grd = ctx.createLinearGradient(x, y, x + Math.cos(ra) * rl, y + Math.sin(ra) * rl);
      grd.addColorStop(0, hs(o.hue, 100, 85, 0.4 * pulse));
      grd.addColorStop(1, "transparent");
      ctx.strokeStyle = grd; ctx.lineWidth = 2 + Math.sin(ri + t) * 0.8;
      ctx.beginPath(); ctx.moveTo(x + Math.cos(ra) * rv * 0.9, y + Math.sin(ra) * rv * 0.9);
      ctx.lineTo(x + Math.cos(ra) * rl, y + Math.sin(ra) * rl); ctx.stroke();
    }
    ctx.restore();
    // Core with granulation
    ctx.save();
    ctx.beginPath(); ctx.arc(x, y, rv, 0, TAU); ctx.clip();
    var sc = ctx.createRadialGradient(x - rv * 0.15, y - rv * 0.2, rv * 0.05, x, y, rv);
    sc.addColorStop(0, "#fffef0");
    sc.addColorStop(0.25, hs(o.hue + 5, 100, 85));
    sc.addColorStop(0.6, hs(o.hue, 100, 60));
    sc.addColorStop(0.9, hs(o.hue + 15, 90, 40));
    sc.addColorStop(1, hs(o.hue + 25, 80, 25));

      var sspy = y + Math.sin(saa) * rv * 0.3;
      ctx.fillStyle = hs(o.hue + 30, 70, 35, 0.6);
      ctx.beginPath(); ctx.arc(sspx, sspy, rv * 0.08, 0, TAU); ctx.fill();

// ═══════════ 3D UNIVERSE COMPONENT ═══════════
function Universe3D(props) {
  var mountRef = useRef(null);
  var pz = props.puzzle;
  var catO = props.catO;

  useEffect(function() {
    if (!mountRef.current || typeof THREE === "undefined") return;
    var mount = mountRef.current;
    var W = mount.clientWidth, H = mount.clientHeight;
    var scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000008, 0.0015);
    var camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 5000);
    camera.position.set(80, 40, 120);
    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(W, H); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000005);
    mount.appendChild(renderer.domElement);

    // Seeded PRNG
    var sd = pz.id * 7919 + 131;
    var rng = function() { sd |= 0; sd = sd + 0x6D2B79F5 | 0; var t = Math.imul(sd ^ sd >>> 15, 1 | sd); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };
    var rr = function(a, b) { return rng() * (b - a) + a; };

    // Background starfield (3000 stars)
    var starGeo = new THREE.BufferGeometry();
    var starPos = [];
    for (var si = 0; si < 3000; si++) {
      var phi = rng() * Math.PI * 2, theta = Math.acos(2 * rng() - 1), rd = 1500 + rng() * 500;
      starPos.push(Math.sin(theta) * Math.cos(phi) * rd, Math.sin(theta) * Math.sin(phi) * rd, Math.cos(theta) * rd);
    }
    starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starPos, 3));
    var starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, sizeAttenuation: false, transparent: true, opacity: 0.8 });
    scene.add(new THREE.Points(starGeo, starMat));

    // Nebula cloud (3 colored point clouds)
    var nebulaColors = catO ? [catO.c] : ["#a78bfa"];
    for (var nci = 0; nci < 3; nci++) {
      var ng = new THREE.BufferGeometry();
      var np = [];
      for (var npi = 0; npi < 500; npi++) {
        np.push(rr(-800, 800), rr(-400, 400), rr(-800, 800));
      }
      ng.setAttribute("position", new THREE.Float32BufferAttribute(np, 3));
      var nm = new THREE.PointsMaterial({ color: new THREE.Color(nebulaColors[0]), size: 8, transparent: true, opacity: 0.04, blending: THREE.AdditiveBlending, depthWrite: false });
      scene.add(new THREE.Points(ng, nm));
    }

    // Central star — color by category
    var starHue = 45;
    if (catO) {
      if (catO.id === "nhi") starHue = 120;
      else if (catO.id === "met") starHue = 25;
      else if (catO.id === "ext") starHue = 280;
      else if (catO.id === "mul") starHue = 270;
      else if (catO.id === "ai") starHue = 200;
      else if (catO.id === "fil") starHue = 260;
    }
    var starSize = 8 + rng() * 6;
    var starGeo2 = new THREE.SphereGeometry(starSize, 48, 48);
    var starColor = new THREE.Color("hsl(" + starHue + ", 90%, 65%)");
    var starMat2 = new THREE.MeshBasicMaterial({ color: starColor });
    var sun = new THREE.Mesh(starGeo2, starMat2);
    scene.add(sun);

    // Star glow sprite (outer halo)
    var glowGeo = new THREE.SphereGeometry(starSize * 1.6, 32, 32);
    var glowMat = new THREE.MeshBasicMaterial({ color: starColor, transparent: true, opacity: 0.2, side: THREE.BackSide });
    scene.add(new THREE.Mesh(glowGeo, glowMat));

    // Point light from star
    var light = new THREE.PointLight(starColor, 2.5, 800, 1.5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x202040, 0.3));

    // Generate 2-5 planets with procedural textures
    var numPlanets = 2 + Math.floor(rng() * 4);
    var planets = [];
    for (var pi2 = 0; pi2 < numPlanets; pi2++) {
      var orbitR = 25 + pi2 * (15 + rng() * 12);
      var planetR = 1.8 + rng() * 3.5;
      var pHue = Math.floor(rng() * 360);

      // Procedural texture via canvas
      var tcv = document.createElement("canvas");
      tcv.width = 256; tcv.height = 128;
      var tctx = tcv.getContext("2d");
      // Base color
      var grd = tctx.createLinearGradient(0, 0, 0, 128);
      grd.addColorStop(0, "hsl(" + pHue + ",45%,25%)");
      grd.addColorStop(0.5, "hsl(" + pHue + ",60%,50%)");
      grd.addColorStop(1, "hsl(" + pHue + ",45%,25%)");
      tctx.fillStyle = grd; tctx.fillRect(0, 0, 256, 128);
      // Noise bands
      for (var bi2 = 0; bi2 < 40; bi2++) {
        var by2 = rng() * 128;
        tctx.fillStyle = "hsla(" + (pHue + rr(-20, 20)) + "," + (50 + rng() * 30) + "%," + (30 + rng() * 40) + "%," + (0.2 + rng() * 0.3) + ")";
        tctx.fillRect(0, by2, 256, 1 + rng() * 4);
      }
      // Spots
      for (var spi = 0; spi < 20; spi++) {
        tctx.fillStyle = "hsla(" + (pHue + rr(-40, 40)) + ",60%," + (20 + rng() * 50) + "%,0.4)";
        tctx.beginPath(); tctx.arc(rng() * 256, rng() * 128, 3 + rng() * 12, 0, TAU); tctx.fill();
      }
      var tex = new THREE.CanvasTexture(tcv);
      tex.wrapS = THREE.RepeatWrapping;

      var pGeo = new THREE.SphereGeometry(planetR, 32, 32);
      var pMat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.8, metalness: 0.1 });
      var planet = new THREE.Mesh(pGeo, pMat);
      planet.userData = { orbit: orbitR, speed: 0.3 / Math.sqrt(orbitR) * 2, angle: rng() * TAU, tilt: rr(-0.3, 0.3) };
      scene.add(planet);
      planets.push(planet);

      // Orbit ring (thin)
      var ringGeo = new THREE.RingGeometry(orbitR - 0.08, orbitR + 0.08, 128);
      var ringMat = new THREE.MeshBasicMaterial({ color: 0x444466, side: THREE.DoubleSide, transparent: true, opacity: 0.25 });
      var ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);

      // Optional moon
      if (rng() > 0.5) {
        var mGeo = new THREE.SphereGeometry(planetR * 0.25, 16, 16);
        var mMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 1 });
        var moon = new THREE.Mesh(mGeo, mMat);
        moon.userData = { parent: planet, dist: planetR * 3, speed: 0.05, angle: rng() * TAU };
        scene.add(moon);
        planet.userData.moon = moon;
      }
    }

    // Simple orbit controls (mouse drag + wheel zoom)
    var camAngleH = 0.6, camAngleV = 0.5, camDist = 150;
    var dragging = false, lx = 0, ly = 0;
    var onDown = function(e) { dragging = true; var t = e.touches ? e.touches[0] : e; lx = t.clientX; ly = t.clientY; };
    var onMove = function(e) { if (!dragging) return; var t = e.touches ? e.touches[0] : e;
      camAngleH += (t.clientX - lx) * 0.005; camAngleV += (t.clientY - ly) * 0.005;
      camAngleV = Math.max(-1.4, Math.min(1.4, camAngleV));
      lx = t.clientX; ly = t.clientY; };
    var onUp = function() { dragging = false; };
    var onWheel = function(e) { e.preventDefault(); camDist = Math.max(30, Math.min(500, camDist * (e.deltaY > 0 ? 1.1 : 0.9))); };
    renderer.domElement.addEventListener("mousedown", onDown);
    renderer.domElement.addEventListener("mousemove", onMove);
    renderer.domElement.addEventListener("mouseup", onUp);
    renderer.domElement.addEventListener("mouseleave", onUp);
    renderer.domElement.addEventListener("touchstart", onDown);
    renderer.domElement.addEventListener("touchmove", onMove);
    renderer.domElement.addEventListener("touchend", onUp);
    renderer.domElement.addEventListener("wheel", onWheel);

    var onResize = function() { W = mount.clientWidth; H = mount.clientHeight; camera.aspect = W / H; camera.updateProjectionMatrix(); renderer.setSize(W, H); };
    window.addEventListener("resize", onResize);

    var reqId;
    var animate = function() {
      reqId = requestAnimationFrame(animate);
      // Camera orbit
      camera.position.x = Math.cos(camAngleH) * Math.cos(camAngleV) * camDist;
      camera.position.y = Math.sin(camAngleV) * camDist;
      camera.position.z = Math.sin(camAngleH) * Math.cos(camAngleV) * camDist;
      camera.lookAt(0, 0, 0);
      // Rotate planets
      planets.forEach(function(p) {
        p.userData.angle += p.userData.speed * 0.01;
        p.position.x = Math.cos(p.userData.angle) * p.userData.orbit;
        p.position.z = Math.sin(p.userData.angle) * p.userData.orbit;
        p.position.y = Math.sin(p.userData.angle * 0.3) * 2;
        p.rotation.y += 0.005;
        if (p.userData.moon) {
          var m = p.userData.moon;
          m.userData.angle += m.userData.speed;
          m.position.x = p.position.x + Math.cos(m.userData.angle) * m.userData.dist;
          m.position.z = p.position.z + Math.sin(m.userData.angle) * m.userData.dist;
          m.position.y = p.position.y;
        }
      });
      sun.rotation.y += 0.002;
      renderer.render(scene, camera);
    };
    animate();

    return function() {
      cancelAnimationFrame(reqId);
      window.removeEventListener("resize", onResize);
      renderer.domElement.removeEventListener("mousedown", onDown);
      renderer.domElement.removeEventListener("mousemove", onMove);
      renderer.domElement.removeEventListener("mouseup", onUp);
      renderer.domElement.removeEventListener("wheel", onWheel);
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
      renderer.dispose();
    };
  }, [pz]);

  return (
    <div style={{ position: "fixed", inset: 0, background: "#000", zIndex: 1000 }}>
      <div ref={mountRef} style={{ width: "100%", height: "100%" }} />
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, padding: "16px 20px", background: "linear-gradient(to bottom, rgba(0,0,0,0.8), transparent)", pointerEvents: "none" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", pointerEvents: "auto" }}>
          <div>
            <div style={{ fontSize: 8, color: catO ? catO.c : "#888", fontWeight: 700, letterSpacing: "0.15em", textTransform: "uppercase", fontFamily: "system-ui" }}>{catO ? catO.i + " " + catO.l : ""} · #{pz.id}</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: "#fff", fontFamily: "Georgia, serif", marginTop: 4 }}>{pz.n}</div>
            <div style={{ fontSize: 11, color: "#888", fontFamily: "system-ui" }}>{pz.s} · Univers procedural 3D</div>
          </div>
          <button onClick={props.onClose} style={{ background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", color: "#fff", borderRadius: 8, padding: "8px 14px", fontSize: 12, cursor: "pointer", fontFamily: "system-ui" }}>✕ Închide</button>
        </div>
      </div>
      <div style={{ position: "absolute", bottom: 16, left: "50%", transform: "translateX(-50%)", fontSize: 10, color: "#666", fontFamily: "system-ui", background: "rgba(0,0,0,0.6)", padding: "6px 14px", borderRadius: 20 }}>
        Trage pentru a roti · Scroll pentru zoom
      </div>
    </div>
  );
}

// ═══ CINEMATIC 3D BACKGROUND (behind 2D puzzle) ═══
function Bg3D(props) {
  var mountRef = useRef(null);
  useEffect(function() {
    if (!mountRef.current || typeof THREE === "undefined") return;
    var mount = mountRef.current;
    var W = mount.clientWidth || window.innerWidth, H = mount.clientHeight || window.innerHeight;
    var scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000005, 0.0008);
    var camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 5000);
    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(W, H); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000005);
    mount.appendChild(renderer.domElement);

    var sd = props.puzzleId * 7919 + 131;
    var rng = function() { sd |= 0; sd = sd + 0x6D2B79F5 | 0; var t = Math.imul(sd ^ sd >>> 15, 1 | sd); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; };
    var rr = function(a, b) { return rng() * (b - a) + a; };

    // Background starfield
    var sg = new THREE.BufferGeometry();
    var sp = [];
    for (var si = 0; si < 2500; si++) {
      var ph = rng() * Math.PI * 2, th = Math.acos(2 * rng() - 1), rd = 1500 + rng() * 500;
      sp.push(Math.sin(th) * Math.cos(ph) * rd, Math.sin(th) * Math.sin(ph) * rd, Math.cos(th) * rd);
    }
    sg.setAttribute("position", new THREE.Float32BufferAttribute(sp, 3));
    scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: 1.3, sizeAttenuation: false, transparent: true, opacity: 0.7 })));

    // Nebula clouds by category
    var catHue = { lit: 45, fil: 270, cri: 0, cit: 140, ai: 200, nhi: 120, mul: 285, ext: 320, ste: 50, hip: 170, met: 25, int: 215 };
    var baseHue = catHue[props.catId] || 220;
    for (var nci = 0; nci < 4; nci++) {
      var ng = new THREE.BufferGeometry();
      var np = [];
      var cx = rr(-400, 400), cy = rr(-200, 200), cz = rr(-600, -200);
      for (var npi = 0; npi < 400; npi++) {
        np.push(cx + rr(-200, 200), cy + rr(-100, 100), cz + rr(-100, 100));
      }
      ng.setAttribute("position", new THREE.Float32BufferAttribute(np, 3));
      scene.add(new THREE.Points(ng, new THREE.PointsMaterial({ color: new THREE.Color("hsl(" + (baseHue + rr(-30, 30)) + ",70%,55%)"), size: 12, transparent: true, opacity: 0.05, blending: THREE.AdditiveBlending, depthWrite: false })));
    }

    // Distant star (decorative sun)
    var starGeo = new THREE.SphereGeometry(6, 32, 32);
    var starMat = new THREE.MeshBasicMaterial({ color: new THREE.Color("hsl(" + baseHue + ",90%,70%)") });
    var sun = new THREE.Mesh(starGeo, starMat);
    sun.position.set(rr(-150, 150), rr(-80, 80), -300);
    scene.add(sun);
    var sunGlow = new THREE.Mesh(new THREE.SphereGeometry(18, 24, 24), new THREE.MeshBasicMaterial({ color: starMat.color, transparent: true, opacity: 0.12, side: THREE.BackSide }));
    sunGlow.position.copy(sun.position);
    scene.add(sunGlow);

    // 2-3 distant planets as decoration
    var planets = [];
    var nP = 2 + Math.floor(rng() * 2);
    for (var pi2 = 0; pi2 < nP; pi2++) {
      var pGeo = new THREE.SphereGeometry(3 + rng() * 4, 24, 24);
      var pHue = Math.floor(rng() * 360);
      var pMat = new THREE.MeshBasicMaterial({ color: new THREE.Color("hsl(" + pHue + ",55%,45%)") });
      var pl = new THREE.Mesh(pGeo, pMat);
      pl.position.set(rr(-250, 250), rr(-120, 120), rr(-450, -150));
      pl.userData = { rotSpeed: rr(0.001, 0.004), driftX: rr(-0.02, 0.02), driftY: rr(-0.01, 0.01) };
      scene.add(pl);
      planets.push(pl);
    }

    camera.position.set(0, 0, 50);
    camera.lookAt(0, 0, -200);

    var onResize = function() { W = mount.clientWidth; H = mount.clientHeight; camera.aspect = W / H; camera.updateProjectionMatrix(); renderer.setSize(W, H); };
    window.addEventListener("resize", onResize);

    var reqId;
    var t0 = 0;
    var animate = function() {
      reqId = requestAnimationFrame(animate);
      t0 += 0.008;
      camera.position.x = Math.sin(t0 * 0.15) * 5;
      camera.position.y = Math.cos(t0 * 0.12) * 3;
      camera.lookAt(0, 0, -200);
      planets.forEach(function(p) { p.rotation.y += p.userData.rotSpeed; p.position.x += p.userData.driftX; p.position.y += p.userData.driftY; });
      renderer.render(scene, camera);
    };
    animate();

    return function() {
      cancelAnimationFrame(reqId);
      window.removeEventListener("resize", onResize);
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
      renderer.dispose();
    };
  }, [props.puzzleId]);

  return <div ref={mountRef} style={{ position: "absolute", inset: 0, zIndex: 0, pointerEvents: "none" }} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script></body></html>
